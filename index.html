    <style>
        :root {
            --bg: #FAFAF8;
            --surface: #FFFFFF;
            --border: #E8E6E1;
            --border-hover: #D0CDC6;
            --text-primary: #1A1A18;
            --text-secondary: #6B6860;
            --text-tertiary: #9E9B93;
            --accent: #2D5A3D;
            --accent-light: #E8F0EB;
            --question-bg: #F0F4F8;
            --question-border: #C8D6E0;
            --answer-bg: #F0F8F2;
            --answer-border: #B8D4C0;
            --reasoning-bg: #FFF9EE;
            --reasoning-border: #E8D08C;
            --tag-bg: #F2F1EE;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
            --radius: 8px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px 40px;
        }

        .header p.label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .header h1 {
            font-family: 'Source Serif 4', serif;
            font-size: clamp(28px, 4vw, 40px);
            font-weight: 700;
            line-height: 1.25;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .header .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 640px;
            line-height: 1.7;
        }

        .stats-bar {
            max-width: 1200px;
            margin: 0 auto 32px;
            padding: 0 24px;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .stat { display: flex; align-items: baseline; gap: 8px; }

        .stat-value {
            font-family: 'Source Serif 4', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label { font-size: 13px; color: var(--text-tertiary); }

        /* ---- Subtitle above pills ---- */
        .type-nav-label {
            max-width: 1200px;
            margin: 0 auto 10px;
            padding: 0 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-tertiary);
        }

        /* ---- Pill Navigation (wrapping) ---- */
        .type-nav {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 24px;
        }

        .type-nav-scroll { overflow: visible; }

        .type-nav-inner {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-bottom: 12px;
        }

        .type-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px;
            font-weight: 500;
            padding: 10px 20px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .type-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent);
            background: var(--accent-light);
            box-shadow: 0 2px 8px rgba(45, 90, 61, 0.08);
            transform: translateY(-1px);
        }

        .type-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 3px 12px rgba(45, 90, 61, 0.18);
        }

        .type-btn .count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            opacity: 0.65;
            margin-left: 6px;
        }

        /* ---- 2x2 Grid Cards ---- */
        .examples-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px 80px;
        }

        .type-section { display: none; }
        .type-section.active { display: block; }

        .type-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .example-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .example-card:hover { box-shadow: var(--shadow-md); }

        .card-header {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .card-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .card-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-tertiary);
            background: var(--tag-bg);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .card-tags {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .card-tag {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .card-tag.specialty { background: #EDE8F5; color: #5B4A8A; }
        .card-tag.procedure { background: #E3EFF8; color: #3A6A8A; }

        .card-body { padding: 14px 16px; flex: 1; }

        .video-wrapper {
            margin-bottom: 12px;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface);
        }

        .video-wrapper video {
            width: 100%;
            display: block;
            max-height: 220px;
            object-fit: contain;
        }

        /* ---- QA Blocks ---- */
        .qa-block {
            border-radius: var(--radius);
            padding: 10px 14px;
            margin-bottom: 10px;
        }
        .qa-block:last-child { margin-bottom: 0; }

        .qa-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .qa-block.question { background: var(--question-bg); border-left: 3px solid var(--question-border); }
        .qa-block.question .qa-label { color: #4A6F8A; }

        .qa-block.answer { background: var(--answer-bg); border-left: 3px solid var(--answer-border); }
        .qa-block.answer .qa-label { color: var(--accent); }

        .qa-block.reasoning { background: var(--reasoning-bg); border-left: 3px solid var(--reasoning-border); }
        .qa-block.reasoning .qa-label { color: #9A7B2E; }

        .qa-text { font-size: 13px; line-height: 1.6; color: var(--text-primary); }

        /* ---- Two-column options ---- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
            margin-top: 10px;
        }

        .option-item {
            font-size: 12.5px;
            padding: 5px 8px;
            color: var(--text-secondary);
            line-height: 1.4;
            border-radius: 6px;
            background: rgba(255,255,255,0.5);
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .option-item.correct {
            color: var(--accent);
            font-weight: 600;
            background: rgba(45, 90, 61, 0.08);
        }

        .option-letter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
            width: 18px;
        }

        .option-check {
            margin-left: auto;
            flex-shrink: 0;
            font-size: 13px;
        }

        /* ---- Transcript toggle ---- */
        .transcript-toggle {
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            color: var(--text-secondary);
            background: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .transcript-toggle:hover { border-color: var(--border-hover); color: var(--text-primary); }

        .transcript-content {
            display: none;
            margin-top: 8px;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.7;
            max-height: 150px;
            overflow-y: auto;
        }

        .transcript-content.open { display: block; }

        .transcript-ts {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-tertiary);
        }

        .footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer p { font-size: 13px; color: var(--text-tertiary); }

        @media (max-width: 800px) {
            .header { padding: 40px 16px 24px; }
            .stats-bar { padding: 0 16px; gap: 20px; }
            .type-nav { padding: 0 16px; }
            .examples-container { padding: 16px 16px 60px; }
            .examples-grid { grid-template-columns: 1fr; }
            .card-body { padding: 12px; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    const typeKeys = Object.keys(DATA);
    let totalExamples = 0;
    typeKeys.forEach(k => totalExamples += DATA[k].examples.length);

    document.getElementById('stat-examples').textContent = totalExamples;
    document.getElementById('stat-types').textContent = typeKeys.length;

    // Build tabs
    const tabsContainer = document.getElementById('type-tabs');
    typeKeys.forEach((type, i) => {
        const btn = document.createElement('button');
        btn.className = 'type-btn' + (i === 0 ? ' active' : '');
        btn.innerHTML = `${type}<span class="count">${DATA[type].examples.length}</span>`;
        btn.dataset.type = type;
        btn.addEventListener('click', () => switchTab(type));
        tabsContainer.appendChild(btn);
    });

    // Build sections with 2x2 grid
    const root = document.getElementById('examples-root');
    typeKeys.forEach((type, i) => {
        const section = document.createElement('div');
        section.className = 'type-section' + (i === 0 ? ' active' : '');
        section.id = 'section-' + slugify(type);

        let html = `<p class="type-description">${DATA[type].description}</p>`;
        html += '<div class="examples-grid">';
        DATA[type].examples.forEach((ex, j) => { html += renderCard(ex, j + 1); });
        html += '</div>';

        section.innerHTML = html;
        root.appendChild(section);
    });

    // Attach transcript toggles
    document.querySelectorAll('.transcript-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
            const content = btn.nextElementSibling;
            const isOpen = content.classList.toggle('open');
            btn.textContent = isOpen ? '\u25BE Hide transcript' : '\u25B8 Show transcript';
        });
    });

    function switchTab(type) {
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.type-btn[data-type="${type}"]`).classList.add('active');
        document.querySelectorAll('.type-section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + slugify(type)).classList.add('active');
        const activeBtn = document.querySelector(`.type-btn[data-type="${type}"]`);
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    function slugify(str) {
        return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function renderCard(ex, num) {
        // Two-column options with checkmark on correct
        let optionsHtml = '';
        if (ex.options && ex.options.length > 0) {
            optionsHtml = '<div class="options-grid">';
            ex.options.forEach(o => {
                optionsHtml += `
                    <div class="option-item ${o.correct ? 'correct' : ''}">
                        <span class="option-letter">${o.letter}.</span>
                        <span>${o.text}</span>
                        ${o.correct ? '<span class="option-check">\u2713</span>' : ''}
                    </div>`;
            });
            optionsHtml += '</div>';
        }

        // Collapsible transcript
        let transcriptHtml = '';
        if (ex.transcript) {
            const formatted = ex.transcript
                .replace(/\[([^\]]+)\]/g, '<span class="transcript-ts">[$1]</span>')
                .replace(/\n/g, '<br>');
            transcriptHtml = `
            <button class="transcript-toggle">\u25B8 Show transcript</button>
            <div class="transcript-content">${formatted}</div>`;
        }

        return `
        <div class="example-card">
            <div class="card-header">
                <span class="card-number">Example ${num}</span>
                <div class="card-tags">
                    ${ex.specialty ? `<span class="card-tag specialty">${ex.specialty}</span>` : ''}
                    ${ex.procedure ? `<span class="card-tag procedure">${ex.procedure}</span>` : ''}
                    <span class="card-time">${ex.time_window}</span>
                </div>
            </div>
            <div class="card-body">
                <div class="video-wrapper">
                    <video controls autoplay muted loop playsinline preload="auto">
                        <source src="${ex.video}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div class="qa-block question">
                    <div class="qa-label">Question</div>
                    <div class="qa-text">${ex.question}</div>
                    ${optionsHtml}
                </div>
                <div class="qa-block answer">
                    <div class="qa-label">Answer</div>
                    <div class="qa-text">${ex.answer}</div>
                </div>
                ${transcriptHtml}
            </div>
        </div>`;
    }
